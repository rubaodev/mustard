# EXAMPLE framework vocabulary — GraphQL.
#
# Copy this file to `<your-project>/.claude/vocab/frameworks.toml` to teach
# mustard's local-first scan how to recognise GraphQL. It is *data you opt into*:
# the mustard core stays generic and ships no GraphQL knowledge of its own.
# Detection is fully LOCAL — NO network and NO LLM.
#
# ## Two schemas, one file
#
# 1. `[[dependency]]` (PRIMARY — drives the registry label). The scan classifies
#    a subproject's DECLARED dependency names (from Cargo.toml / package.json /
#    *.csproj / go.mod / pyproject.toml) into `orm` / `framework` / `di`. The
#    distinct categories present become `_patterns.{stack}.frameworks`. A
#    dependency the vocab does not map is recorded as an
#    `unclassifiedDependencies` gap — never fabricated into a category. This is
#    manifest-driven, so a project that merely MENTIONS `graphql` in source (a
#    comment, a string) carries no label; only a DECLARED dependency does.
#
#    Schema: `category` (one of `orm` / `framework` / `di`), `names` (exact
#    dependency names, case-insensitive), `prefixes` (name prefixes /
#    namespaces, e.g. `@nestjs`).
#
# 2. `[[signal]]` (decorator-tagging only — code patterns). The legacy literal
#    code-token schema. It is retained for the structural extractor's decorator
#    tagging, NOT for the registry framework label. GraphQL is neither an ORM nor
#    a DI container, so every signal here is `category = "framework"`.

# --- PRIMARY: declared-dependency classification -------------------------------
# A project that DECLARES one of these GraphQL packages is labelled `framework`.
[[dependency]]
category = "framework"
names = [
    # Rust
    "async-graphql",
    "juniper",
    # JS / TS
    "graphql",
    "graphql-tag",
    "apollo-server",
    "@apollo/server",
    "@apollo/client",
    # Python
    "graphene",
    "strawberry-graphql",
    "ariadne",
    # Go
    "github.com/graphql-go/graphql",
    "github.com/99designs/gqlgen",
    # Java
    "graphql-java",
]
prefixes = [
    # NestJS / Apollo GraphQL namespaces
    "@nestjs/graphql",
    "@apollo",
    "github.com/graphql-go",
]

# --- SECONDARY: decorator code-token signals (decorator tagging only) ----------
# NestJS code-first GraphQL decorators (@nestjs/graphql) + graphql-js / Apollo
# server-and-client + the `gql` tagged template. All literal substrings.
[[signal]]
category = "framework"
patterns = [
    # NestJS code-first resolvers & schema decorators (@nestjs/graphql)
    "@Resolver",
    "@Query(",
    "@Mutation(",
    "@Subscription(",
    "@ObjectType(",
    "@InputType(",
    "@Field(",
    "@Args(",
    "@ResolveField(",
    # The `gql` tagged template literal (Apollo / graphql-tag): the opening
    # backtick is the signal — `gql` followed by a backtick template.
    "gql`",
    # Apollo Client React hooks
    "useQuery(",
    "useMutation(",
    "useSubscription(",
    # Apollo Server / Client constructors
    "ApolloServer(",
    "ApolloClient(",
    # graphql-js / graphql-tools schema builders
    "makeExecutableSchema(",
    "buildSchema(",
]

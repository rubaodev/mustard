name: Dashboard Release

on:
  push:
    tags:
      - 'dashboard-v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as a draft release'
        required: false
        default: 'true'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macos-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            label: macos-x64
          - platform: ubuntu-22.04
            args: ''
            label: linux-x64
          - platform: windows-latest
            args: ''
            label: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/dashboard/src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/dashboard
          tagName: dashboard-v__VERSION__
          releaseName: 'Mustard Dashboard v__VERSION__'
          releaseBody: |
            Native installers for Windows, macOS (Intel + Apple Silicon), and Linux.

            Download the build matching your platform from the assets below.
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft == 'true' || true }}
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload artifacts (manual run, no release)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-${{ matrix.label }}
          path: |
            apps/dashboard/src-tauri/target/release/bundle/**/*.msi
            apps/dashboard/src-tauri/target/release/bundle/**/*.exe
            apps/dashboard/src-tauri/target/release/bundle/**/*.dmg
            apps/dashboard/src-tauri/target/release/bundle/**/*.app.tar.gz
            apps/dashboard/src-tauri/target/release/bundle/**/*.deb
            apps/dashboard/src-tauri/target/release/bundle/**/*.AppImage
            apps/dashboard/src-tauri/target/release/bundle/**/*.rpm
            apps/dashboard/src-tauri/src-tauri/target/*/release/bundle/**/*
          if-no-files-found: ignore
          retention-days: 14

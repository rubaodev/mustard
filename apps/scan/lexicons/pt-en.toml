# Bilingual DOMAIN lexicon (pt -> en), vendored as DATA — the seed pair.
#
# Tier-4 of the match ladder (matching.rs): when a request token written in
# one natural language has no exact/fold/stem match against the repo's own
# vocabulary, the translations below act as OR-synonyms (Pirkola-style
# structured queries), never as a replacement. A curated DOMAIN glossary is
# deliberate: a general dictionary explodes ambiguity (~50% of monolingual
# effectiveness in the CLIR literature, see docs/REDESENHO-INDICE-DIGEST-
# AGNOSTICO.md), so only stable business-domain equivalences belong here.
#
# Shape: keys are the `pt` side, values the `en` synonyms. Lookups are
# bidirectional (pt request -> en identifier AND en request -> pt identifier)
# and accent-folded, so keys are written pre-folded in plain ASCII. A request
# token may be inflected — it reaches an entry via the same-language stem
# ("cancelado" finds "cancelar") — but the CODE side must equal a key or a
# synonym exactly: no fuzziness on the index side, ever.
#
# A new language pair = one `<a>-<b>.toml` file here + one data row in
# src/stemmers.rs. Projects can extend coverage by growing this catalog —
# a missing true cognate is an honest miss, preferred over a false one.

[terms]
aprovacao = ["approval"]
cancelar = ["cancel"]
cliente = ["customer", "client"]
cobranca = ["charge", "billing"]
conta = ["account"]
desconto = ["discount"]
desdobramento = ["split"]
empresa = ["company"]
endereco = ["address"]
estorno = ["refund", "chargeback"]
fatura = ["invoice"]
fornecedor = ["supplier", "vendor"]
imposto = ["tax"]
juros = ["interest"]
lancamento = ["entry", "posting"]
moeda = ["currency"]
pagamento = ["payment"]
parcela = ["installment"]
pedido = ["order"]
permissao = ["permission"]
recebivel = ["receivable"]
relatorio = ["report"]
saldo = ["balance"]
titulo = ["receivable"]
usuario = ["user"]

# Built-in stack registry — DATA, not logic.
#
# Embedded into `mustard-core` via `include_str!` (see
# `vocabulary::stacks::BUILTIN_STACKS_TOML`). It is the *guaranteed base* for
# stack inference: detection works offline with no project-local file present.
# An on-disk `.claude/vocab/stacks.toml` overrides this base wholesale — see
# `StackRegistry::load`.
#
# Schema: one `[[stack]]` table-array entry per stack, carrying:
#   - `name`            — canonical stack identifier (lowercase).
#   - `language`        — optional host language hint (lowercase).
#   - `manifest_deps`   — dependency names as they appear in build manifests.
#   - `path_markers`    — directory/file path fragments characteristic of the
#                         stack's conventional layout.
#   - `code_signatures` — literal source substrings (Aho-Corasick signals, not
#                         grammars — deliberately short).
#
# No stack name is hardcoded in the inference logic: adding a stack here (or in
# the on-disk override) is sufficient.

[[stack]]
name = "laravel"
language = "php"
manifest_deps = ["laravel/framework", "laravel/tinker"]
path_markers = ["app/Http/Controllers", "routes/web.php", "artisan", "database/migrations"]
code_signatures = ["Illuminate\\Support\\Facades", "extends Controller", "Schema::create("]

[[stack]]
name = "django"
language = "python"
manifest_deps = ["django", "djangorestframework"]
path_markers = ["manage.py", "settings.py", "urls.py", "wsgi.py"]
code_signatures = ["from django.db import models", "models.Model", "INSTALLED_APPS"]

[[stack]]
name = "nextjs"
language = "javascript"
manifest_deps = ["next"]
path_markers = ["next.config.js", "next.config.mjs", "next.config.ts"]
code_signatures = ["next/router", "next/navigation", "next/link", "next/server"]

# dotnet/nuget ecosystem. NuGet ids arrive verbatim from the csproj/fsproj
# `PackageReference Include="..."` attribute (xml-attr format, see
# apps/scan/manifests.toml), so each term is a full package id — the
# boundary-aware dep match treats `.` as part of the name, never a boundary,
# which is why the common EF Core flavors are listed individually.
# `Program.cs` is deliberately NOT a path marker: every C# project type
# (console, worker, WPF) ships one, so it is not web-distinctive. A bare
# `Controllers` marker is avoided too: it would fire on Laravel's
# `app/Http/Controllers` at a path-component boundary.
[[stack]]
name = "aspnet"
language = "csharp"
# EF Core packages are deliberately NOT listed: EF is an ORM usable from any
# host (console, worker), so it is not web evidence — a console+EF app must not
# converge to the two-class tier on ORM deps alone.
manifest_deps = [
    "Microsoft.AspNetCore.OpenApi",
    "Swashbuckle.AspNetCore",
    "Microsoft.AspNetCore.Authentication.JwtBearer",
]
path_markers = ["appsettings.json", "appsettings.Development.json", "wwwroot", "Properties/launchSettings.json"]
code_signatures = ["Microsoft.AspNetCore", "WebApplication.CreateBuilder(", "[ApiController]"]

[[stack]]
name = "flutter"
language = "dart"
manifest_deps = ["flutter", "flutter_test"]
path_markers = ["pubspec.yaml", "lib/main.dart"]
code_signatures = ["package:flutter/", "StatelessWidget", "StatefulWidget", "runApp(", "BuildContext"]
